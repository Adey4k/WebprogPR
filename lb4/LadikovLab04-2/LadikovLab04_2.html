<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <MARQUEE behavior="alternate" ><img src="image/1.png"></MARQUEE>
    <MARQUEE direction="left"><img src="image/2.png"></MARQUEE>
    <MARQUEE behavior="slide" direction="right"><img src="image/3.png"></MARQUEE>
    <!-- Параметр scrolldelay визначає затримку між кроками в мілісекундах -->
    <MARQUEE><img src="image/4.png"></MARQUEE>
    <!-- Параметр scrollamount визначає на скільки пікселів текст зсувається за один крок -->
    <MARQUEE scrollamount="12"><img src="image/5.png"></MARQUEE>
</body>
</html>
