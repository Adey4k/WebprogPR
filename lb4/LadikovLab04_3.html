<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div style="display: flex;">
    <MARQUEE behavior="alternate" direction="down" style="background-color: red;">Перший рядок, що біжить</MARQUEE>
    <MARQUEE direction="down" style="background-color: orange;">Другий рядок, що біжить</MARQUEE>
    <MARQUEE behavior="slide" direction="down"  style="background-color: yellow;">Третій рядок, що біжить</MARQUEE>
    <!-- Параметр scrolldelay визначає затримку між кроками в мілісекундах -->
    <MARQUEE scrolldelay="170" direction="down" style="background-color: green;">Четвертий рядок, що біжить</MARQUEE>
    <!-- Параметр scrollamount визначає на скільки пікселів текст зсувається за один крок -->
    <MARQUEE scrollamount="12" direction="down" style="background-color: blue;">П'ятий рядок, що біжить</MARQUEE>
    </div>
</body>
</html>
