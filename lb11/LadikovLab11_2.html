<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анкета студента</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="form-container">
        <form action="LadikovLab11_1.html">
            <h2>Анкета студента</h2>
            
            <div class="form-group">
                <label for="name">Ваше ім'я:</label>
                <input id="name" name="name" type="text" maxlength="40" placeholder="Введіть ім'я">
            </div>

            <div class="form-group">
                <label>Ваша стать:</label>
                <div class="radio-group">
                    <input type="radio" id="male" name="pol" value="male">
                    <label for="male">Чоловіча</label>
                    <input type="radio" id="female" name="pol" value="female">
                    <label for="female">Жіноча</label>
                </div>
            </div>

            <div class="form-group">
                <label for="curs">На якому курсі Ви навчаєтесь?</label>
                <select id="curs" name="curs">
                    <option value="1" selected>Перший</option>
                    <option value="2">Другий</option>
                    <option value="3">Третій</option>
                    <option value="4">Четвертий</option>
                    <option value="5">П'ятий</option>
                </select>
            </div>

            <div class="form-group">
                <label>Які дисципліни ви вивчаєте?</label>
                <div class="checkbox-group">
                    <label><input type="checkbox" name="web" value="yes" checked> WEB-програмування</label>
                    <label><input type="checkbox" name="eldinam" value="yes"> Технічна електродинаміка</label>
                </div>
            </div>

            <div class="form-group">
                <label for="about">Напишіть декілька слів про себе:</label>
                <textarea id="about" name="about" rows="4"></textarea>
            </div>

            <div class="form-group">
                <label>Завантажити файл:</label>
                <input type="file" name="friend" class="file-input">
            </div>

            <div class="button-group">
                <input type="submit" value="Відіслати дані">
                <input type="reset" value="Очистити" class="reset-btn">
            </div>
        </form>
    </div>
</body>
</html>
