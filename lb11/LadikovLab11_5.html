<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анкета користувача</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="form-container">
        <form id="form1" action="LadikovLab11_1.html" method="POST">
            <h2>Анкета користувача</h2>
            
            <!-- 1. Пароль -->
            <div class="form-group">
                <label for="password">1. Пароль:</label>
                <input required id="password" name="password" type="password" maxlength="40" placeholder="Введіть пароль">
            </div>

            <!-- 2. ПІБ -->
            <div class="form-group">
                <label for="personal_id">2. Прізвище, ім'я, по-батькові:</label>
                <input required id="personal_id" name="personal_id" type="text" maxlength="100" placeholder="Прізвище Ім'я По-батькові">
            </div>

            <!-- 3. Держава -->
            <div class="form-group">
                <label for="country">3. Держава проживання:</label>
                <select id="country" name="country" required>
                    <option value="">Оберіть державу...</option>
                    <option value="UA">Україна</option>
                    <option value="PL">Польща</option>
                    <option value="DE">Німеччина</option>
                    <option value="US">США</option>
                    <option value="CA">Канада</option>
                    <option value="GB">Велика Британія</option>
                    <option value="FR">Франція</option>
                    <option value="IT">Італія</option>
                    <option value="ES">Іспанія</option>
                    <option value="JP">Японія</option>
                </select>
            </div>

            <!-- 4. Поштовий індекс -->
            <div class="form-group">
                <label for="postal_code">4. Поштовий індекс:</label>
                <input id="postal_code" name="postal_code" type="text" maxlength="5" placeholder="00000">
            </div>

            <!-- 5. Місце проживання (Radio) -->
            <div class="form-group">
                <label>5. Місце проживання:</label>
                <div class="checkbox-group" style="display: block;">
                    <label><input type="radio" name="residence" value="kyiv" required> Київ</label><br>
                    <label><input type="radio" name="residence" value="kharkiv"> Харків</label><br>
                    <label><input type="radio" name="residence" value="odesa"> Одеса</label><br>
                    <label><input type="radio" name="residence" value="dnipro"> Дніпро</label><br>
                    <label><input type="radio" name="residence" value="lviv"> Львів</label><br>
                    <label>
                        <input type="radio" name="residence" value="other" id="residence_other"> Інше: 
                        <input type="text" name="residence_other_text" onfocus="document.getElementById('residence_other').checked = true;" style="width: auto; display: inline-block; padding: 5px;" placeholder="Ваше місто">
                    </label>
                </div>
            </div>

            <!-- 6-7. Адреса -->
            <div class="form-group">
                <label for="street">6. Вулиця:</label>
                <input id="street" name="street" type="text" placeholder="Назва вулиці">
            </div>
            <div class="form-group">
                <label for="building">7. Будинок:</label>
                <input id="building" name="building" type="text" style="width: 80px;">
            </div>

            <!-- 8. Email -->
            <div class="form-group">
                <label for="email">8. Електронна адреса:</label>
                <input required id="email" name="email" type="email" placeholder="example@mail.com">
            </div>

            <!-- 9. Захоплення -->
            <div class="form-group">
                <label>9. Ваші захоплення:</label>
                <div class="checkbox-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
                    <label><input type="checkbox" name="hobbies" value="sport"> Спорт</label>
                    <label><input type="checkbox" name="hobbies" value="music"> Музика</label>
                    <label><input type="checkbox" name="hobbies" value="movies"> Кіно</label>
                    <label><input type="checkbox" name="hobbies" value="reading"> Читання</label>
                    <label><input type="checkbox" name="hobbies" value="traveling"> Подорожі</label>
                    <label><input type="checkbox" name="hobbies" value="cooking"> Кулінарія</label>
                </div>
                <div style="margin-top: 10px;">
                    <label>
                        <input type="checkbox" name="hobbies" value="other" id="hobbies_other"> Інше: 
                        <input type="text" name="hobbies_other_text" onfocus="document.getElementById('hobbies_other').checked = true;" style="width: auto; display: inline-block; padding: 5px;" placeholder="Ваше захоплення">
                    </label>
                </div>
            </div>

            <!-- 10. Мови -->
            <div class="form-group">
                <label>10. Якими мовами володієте?</label>
                <div class="checkbox-group" style="display: block;">
                    <label><input type="checkbox" name="languages" value="ukrainian"> Українська</label><br>
                    <label><input type="checkbox" name="languages" value="english"> Англійська</label><br>
                    <label><input type="checkbox" name="languages" value="german"> Німецька</label>
                </div>
            </div>

            <!-- 11. Побажання -->
            <div class="form-group">
                <label for="wishes">11. Ваші побажання:</label>
                <textarea id="wishes" name="wishes" rows="4"></textarea>
            </div>

            <div class="button-group" style="flex-direction: column;">
                <input type="submit" value="Надіслати дані та перейти до 2 етапу">
                <input type="reset" value="Відмінити введення" class="reset-btn">
            </div>
        </form>
    </div>
</body>
</html>
