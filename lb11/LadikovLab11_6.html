<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анкета користувача віртуальної бібліотеки</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="form-container">
        <form id="form1" action="LadikovLab11_1.html" method="POST">
            <h2>Анкета бібліотеки</h2>
            
            <!-- 1-2. Прізвище та Ім'я -->
            <div class="form-group">
                <label for="last_name">1. Прізвище:</label>
                <input required id="last_name" name="last_name" type="text" maxlength="50" placeholder="Ваше прізвище">
            </div>

            <div class="form-group">
                <label for="first_name">2. Ім'я:</label>
                <input required id="first_name" name="first_name" type="text" maxlength="50" placeholder="Ваше ім'я">
            </div>

            <!-- 3. Пароль -->
            <div class="form-group">
                <label for="password">3. Пароль:</label>
                <input required id="password" name="password" type="password" maxlength="40">
            </div>

            <!-- 4. Стать -->
            <div class="form-group">
                <label>4. Стать:</label>
                <div class="radio-group">
                    <input type="radio" id="male" name="gender" value="male" required>
                    <label for="male">Чоловіча</label>
                    <input type="radio" id="female" name="gender" value="female">
                    <label for="female">Жіноча</label>
                </div>
            </div>

            <!-- 5. Заняття (Checkbox) -->
            <div class="form-group">
                <label>5. Чим займаєтеся?</label>
                <div class="checkbox-group" style="display: block;">
                    <label><input type="checkbox" name="occupation" value="student"> Навчаюся</label><br>
                    <label><input type="checkbox" name="occupation" value="employed"> Працюю за наймом</label><br>
                    <label><input type="checkbox" name="occupation" value="freelance"> Фрілансер</label><br>
                    <label><input type="checkbox" name="occupation" value="unemployed"> Підприємець</label><br>
                    <label><input type="checkbox" name="occupation" value="retired"> Інше</label>
                </div>
            </div>

            <!-- 6. Вік -->
            <div class="form-group">
                <label>6. Ваш вік:</label>
                <div class="checkbox-group" style="display: block;">
                    <label><input type="radio" name="age_group" value="under_18" required> до 18 років</label><br>
                    <label><input type="radio" name="age_group" value="18_25"> 18 - 25 років</label><br>
                    <label><input type="radio" name="age_group" value="26_35"> 26 - 35 років</label><br>
                    <label><input type="radio" name="age_group" value="36_50"> 36 - 50 років</label><br>
                    <label><input type="radio" name="age_group" value="over_50"> 50+ років</label>
                </div>
            </div>

            <!-- 7. Тематика (Multiple Select) -->
            <div class="form-group">
                <label for="interests">7. Якою тематикою цікавитеся?</label>
                <select id="interests" name="interests" multiple size="6" required style="height: auto;">
                    <option value="scifi">Наукова фантастика</option>
                    <option value="detective">Детективи та трилери</option>
                    <option value="science">Науково-популярна література</option>
                    <option value="history">Історія</option>
                    <option value="it">Програмування та ІТ</option>
                    <option value="psychology">Психологія</option>
                    <option value="business">Бізнес та економіка</option>
                    <option value="romance">Любовні романи</option>
                    <option value="biography">Біографії та мемуари</option>
                    <option value="poetry">Поезія</option>
                    <option value="fantasy">Фентезі</option>
                    <option value="classic">Класична література</option>
                </select>
                <small style="display: block; margin-top: 5px; color: #666;">(утримуйте Ctrl для множинного вибору)</small>
            </div>

            <!-- 8. Що читаєте -->
            <div class="form-group">
                <label for="current_reading">8. Що зараз читаєте?</label>
                <textarea id="current_reading" name="current_reading" rows="3"></textarea>
            </div>

            <div class="button-group" style="flex-direction: column;">
                <input type="submit" value="Надіслати анкету">
                <input type="reset" value="Відмінити введення" class="reset-btn">
            </div>
        </form>
    </div>
</body>
</html>
