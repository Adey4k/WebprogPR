<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оформлення замовлення</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="form-container">
        <form id="form1" action="LadikovLab11_1.html">
            <h2>Оформити замовлення</h2>
            
            <!-- 1. Банківський рахунок -->
            <div class="form-group">
                <label for="bank_account">1. Банківський рахунок:</label>
                <input required id="bank_account" name="bank_account" type="text" maxlength="40" placeholder="Введіть номер рахунку">
            </div>

            <!-- 2. Особовий номер -->
            <div class="form-group">
                <label for="personal_id">2. Особовий номер користувача:</label>
                <input required id="personal_id" name="personal_id" type="text" maxlength="40" placeholder="Введіть ID">
            </div>

            <!-- 3. Товари -->
            <div class="form-group">
                <label>3. Оберіть товари (хоча б один):</label>
                <div class="checkbox-group" style="display: block;">
                    <label><input type="checkbox" name="item1" class="group-required"> Товар 1</label><br>
                    <label><input type="checkbox" name="item2" class="group-required"> Товар 2</label><br>
                    <label><input type="checkbox" name="item3" class="group-required"> Товар 3</label><br>
                    <label><input type="checkbox" name="item4" class="group-required"> Товар 4</label><br>
                    <label><input type="checkbox" name="item5" class="group-required"> Товар 5</label><br>
                    <label><input type="checkbox" name="item6" class="group-required"> Товар 6</label>
                </div>
            </div>

            <!-- 4. Коментар -->
            <div class="form-group">
                <label for="about">4. Коментар:</label>
                <textarea id="about" name="about" rows="4"></textarea>
            </div>

            <!-- 5. Оплата -->
            <div class="form-group">
                <label>5. Спосіб оплати:</label>
                <div class="radio-group">
                    <input type="radio" id="cash" name="payment" value="cash" required>
                    <label for="cash">Готівка</label>
                    <input type="radio" id="card" name="payment" value="card">
                    <label for="card">Карткою</label>
                </div>
            </div>

            <!-- 6. Додаткова інформація -->
            <div class="form-group">
                <label>6. Додаткова інформація:</label>
                <div class="checkbox-group" style="display: block;">
                    <label><input type="checkbox" name="whatsLeft"> Дані про залишок на рахунку</label><br>
                    <label><input type="checkbox" name="lastPayments"> Інформація про останні виплати</label>
                </div>
            </div>

            <div class="button-group" style="flex-direction: column;">
                <input type="submit" value="Надіслати дані та перейти до 2 етапу">
                <input type="reset" value="Відмінити введення" class="reset-btn">
            </div>
        </form>
    </div>

    <script>
        const form = document.getElementById('form1');
        const checkboxes = form.querySelectorAll('.group-required');

        form.onsubmit = function(e) {
            const isOneChecked = Array.from(checkboxes).some(cb => cb.checked);
            
            if (!isOneChecked) {
                alert('Будь ласка, оберіть хоча б один товар.');
                e.preventDefault(); // Зупиняємо відправку форми
                return false;
            }
        };
    </script>
</body>
</html>
