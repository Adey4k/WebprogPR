<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мій особистий блог - Реєстрація</title>
    <link rel="stylesheet" href="task1_12.css">
</head>
<body>

    <header>
        <div class="logo-area">
            <h1>Мій особистий блог</h1>
            <p>Ладіков Максим</p>
        </div>
        <div class="nav-links">
            <a href="#">Вхід</a>
            <a href="#">Реєстрація</a>
        </div>
    </header>

    <main>
        <div class="registration-container">
            <div class="registration-header">
                Реєстрація користувача
            </div>
            <form class="registration-form" action="#" method="POST">
                <div class="form-group">
                    <label for="lastname">Прізвище</label>
                    <input type="text" id="lastname" name="lastname">
                </div>
               
                <div class="form-group">
                    <label for="firstname">Ім'я</label>
                    <input type="text" id="firstname" name="firstname">
                </div>

                <div class="form-group">
                    <label for="login">Логін</label>
                    <input type="text" id="login" name="login">
                </div>

                <div class="form-group">
                    <label for="group">Навчальна група</label>
                    <select id="group" name="group">
                        <option value="101">101ТК</option>
                        <option value="102">102ТК</option>
                    </select>
                </div>

                <div class="form-actions">
                    <button type="submit">Зареєструватись</button>
                </div>
            </form>
        </div>
    </main>

    <footer>
        &copy; Всі права захищені.
    </footer>

</body>
</html>
