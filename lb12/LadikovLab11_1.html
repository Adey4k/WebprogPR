<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лабораторна робота №11</title>
    <style>
        /* Центрування контенту по обох осях */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            font-family: 'Segoe UI';
            margin: 0;
        }

        /* Стилізація контейнера */
        .container {
            text-align: center;
            background: white;
            padding: 2rem;
            border-radius: 12px;
            max-width: 90%;
        }

        h2 {
            color: #2c3e50;
            margin-bottom: 1rem;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            margin: 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Лабораторна робота №11. Створення і використання форм</h2>
        <p>Ваша форма прийнята до обробки. Дякуємо за увагу!</p>
    </div>

</body>
</html>
